<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Florida Redistricting Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 70%;
      float: left;
    }

    #sidebar {
      height: 100vh;
      width: 30%;
      float: right;
      padding: 20px;
      box-sizing: border-box;
      background: #fafafa;
      border-left: 1px solid #ddd;
    }

    .district-label {
      background: transparent;
      border: none;
      box-shadow: none;
      font-size: 11px;
      font-weight: 700;
      color: #111;
      text-shadow: 0 0 3px white;
      pointer-events: none;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .muted {
      color: #666;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">
  <div class="title">Florida District Dashboard</div>
  <div class="muted">Click a district to view details</div>
  <hr>
  <div id="content">No district selected</div>
</div>

<script>

const map = L.map('map').setView([27.8, -81.7], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// ---------------- COLOR SCALE ----------------
function getColor(dem, rep) {
  const m = dem - rep;

  if (m >= 30) return '#08306b';
  if (m >= 15) return '#2171b5';
  if (m >= 5) return '#6baed6';
  if (m > -5) return '#cccccc';
  if (m > -15) return '#fc9272';
  if (m > -30) return '#ef3b2c';
  return '#99000d';
}

function updateSidebar(f, dem, rep, marginText) {
  document.getElementById("content").innerHTML = `
    <h2>FL-${f.properties.DISTRICT}</h2>
    <b>Democratic:</b> ${dem.toFixed(1)}%<br>
    <b>Republican:</b> ${rep.toFixed(1)}%<br><br>
    <b>Margin:</b> ${marginText}
  `;
}

// ---------------- LOAD DATA ----------------
fetch('fl_2024_by_2026_district.geojson')
  .then(r => r.json())
  .then(data => {

    const layerGroup = L.geoJSON(data, {

      style: function(f) {
        const d = (f.properties["Dem %"] || 0) * 100;
        const r = (f.properties["Rep %"] || 0) * 100;

        return {
          fillColor: getColor(d, r),
          color: 'white',
          weight: 1,
          fillOpacity: 0.75
        };
      },

      onEachFeature: function(f, layer) {

        const dem = (f.properties["Dem %"] || 0) * 100;
        const rep = (f.properties["Rep %"] || 0) * 100;

        const marginText = dem > rep
          ? `D+${(dem - rep).toFixed(1)}%`
          : `R+${(rep - dem).toFixed(1)}%`;

        const district = f.properties.DISTRICT;

        // ---------------- POPUP (FL- INCLUDED) ----------------
        layer.bindPopup(`
          <b>FL-${district}</b><br><br>
          Democratic: ${dem.toFixed(1)}%<br>
          Republican: ${rep.toFixed(1)}%<br>
          <b>Margin: ${marginText}</b>
        `);

        // ---------------- CLICK → SIDEBAR ----------------
        layer.on('click', () => {
          updateSidebar(f, dem, rep, marginText);
        });

        // ---------------- LABEL (NO FL-) ----------------
        const center = layer.getBounds().getCenter();

        L.marker(center, {
          icon: L.divIcon({
            className: 'district-label',
            html: `${district}`
          }),
          interactive: false
        }).addTo(map);

      }

    }).addTo(map);

    map.fitBounds(layerGroup.getBounds());

  });

</script>

</body>
</html>
