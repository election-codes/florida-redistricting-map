<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Florida Redistricting Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }

    .district-label {
      background: transparent;
      border: none;
      box-shadow: none;
      font-size: 11px;
      font-weight: 700;
      color: #111;
      text-shadow: 0 0 3px white;
      pointer-events: none;
    }

    .legend {
      background: white;
      padding: 10px;
      line-height: 1.4;
      font-size: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

const map = L.map('map').setView([27.8, -81.7], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// ---------------- COLOR SCALE ----------------
function getColor(demPct, repPct) {
  const m = demPct - repPct;

  if (m >= 0.30) return '#08306b';
  if (m >= 0.15) return '#2171b5';
  if (m >= 0.05) return '#6baed6';
  if (m > -0.05) return '#cccccc';
  if (m > -0.15) return '#fc9272';
  if (m > -0.30) return '#ef3b2c';
  return '#99000d';
}

// ---------------- LEGEND ----------------
const legend = L.control({position: 'bottomright'});

legend.onAdd = function () {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML =
    "<b>Partisan Lean (Margin)</b><br>" +
    "<span style='color:#08306b'>■</span> D+30+<br>" +
    "<span style='color:#2171b5'>■</span> D+15 to D+30<br>" +
    "<span style='color:#6baed6'>■</span> D+5 to D+15<br>" +
    "<span style='color:#cccccc'>■</span> Toss-up<br>" +
    "<span style='color:#fc9272'>■</span> R+5 to R+15<br>" +
    "<span style='color:#ef3b2c'>■</span> R+15 to R+30<br>" +
    "<span style='color:#99000d'>■</span> R+30+";
  return div;
};

legend.addTo(map);

// ---------------- DATA ----------------
fetch('fl_2024_by_2026_district.geojson')
  .then(r => r.json())
  .then(data => {

    const layerGroup = L.geoJSON(data, {

      style: function(f) {
        const d = f.properties["Dem %"] || 0;
        const r = f.properties["Rep %"] || 0;

        return {
          fillColor: getColor(d, r),
          color: 'white',
          weight: 1,
          fillOpacity: 0.75
        };
      },

      onEachFeature: function(f, layer) {

        const dem = (f.properties["Dem %"] || 0) * 100;
        const rep = (f.properties["Rep %"] || 0) * 100;

        const margin = dem > rep
          ? `D+${(dem - rep).toFixed(1)}%`
          : `R+${(rep - dem).toFixed(1)}%`;

        const district = f.properties.DISTRICT;

        // ---------------- POPUP ----------------
        layer.bindPopup(
          `<b>${district}</b><br><br>
          Democratic: ${dem.toFixed(1)}%<br>
          Republican: ${rep.toFixed(1)}%<br>
          <b>Margin: ${margin}</b>`
        );

        // ---------------- PERMANENT LABEL (NO FL-) ----------------
        const center = layer.getBounds().getCenter();

        L.marker(center, {
          icon: L.divIcon({
            className: 'district-label',
            html: `${district}`
          }),
          interactive: false
        }).addTo(map);

      }

    }).addTo(map);

    map.fitBounds(layerGroup.getBounds());

  });

</script>

</body>
</html>
