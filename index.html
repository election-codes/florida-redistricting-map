<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Florida Redistricting Dashboard</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 70%;
      float: left;
    }

    #sidebar {
      height: 100vh;
      width: 30%;
      float: right;
      padding: 16px;
      box-sizing: border-box;
      background: #fafafa;
      border-left: 1px solid #ddd;
      overflow-y: auto;
    }

    .district-label {
      background: transparent;
      border: none;
      box-shadow: none;
      font-size: 11px;
      font-weight: 700;
      color: #111;
      text-shadow: 0 0 3px white;
      pointer-events: none;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .searchbox {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
    }

    .card {
      background: white;
      padding: 10px;
      border: 1px solid #ddd;
      margin-bottom: 10px;
    }

    .legend {
      background: white;
      padding: 10px;
      font-size: 12px;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    .highlight {
      stroke: black !important;
      weight: 3 !important;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div id="sidebar">

  <div class="title">Florida Elections Dashboard</div>

  <input id="search" class="searchbox" placeholder="Search district (e.g. 25)" />

  <div id="content">
    Click a district to view details
  </div>

  <div class="legend">
    <b>Margin Scale</b><br>
    🔵 Strong D (30+)<br>
    🔷 Likely D (15–30)<br>
    🔵 Lean D (5–15)<br>
    ⚪ Tossup<br>
    🔴 Lean R (5–15)<br>
    🟥 Likely R (15–30)<br>
    🟤 Strong R (30+)
  </div>

</div>

<script>

const map = L.map('map').setView([27.8, -81.7], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

let geoLayer;
let selected = null;

// ---------------- COLOR FUNCTION ----------------
function getColor(dem, rep) {
  const m = dem - rep;

  if (m >= 30) return '#08306b';
  if (m >= 15) return '#2171b5';
  if (m >= 5) return '#6baed6';
  if (m > -5) return '#cccccc';
  if (m > -15) return '#fc9272';
  if (m > -30) return '#ef3b2c';
  return '#99000d';
}

// ---------------- SIDEBAR ----------------
function updateSidebar(f, dem, rep, marginText) {
  document.getElementById("content").innerHTML = `
    <div class="card">
      <h2>FL-${f.properties.DISTRICT}</h2>

      <b>Democratic:</b> ${dem.toFixed(1)}%<br>
      <b>Republican:</b> ${rep.toFixed(1)}%<br><br>

      <b>Margin:</b> ${marginText}
    </div>
  `;
}

// ---------------- STYLE RESET ----------------
function resetStyle(layer) {
  geoLayer.resetStyle(layer);
}

// ---------------- LOAD MAP ----------------
fetch('fl_2024_by_2026_district.geojson')
  .then(r => r.json())
  .then(data => {

    geoLayer = L.geoJSON(data, {

      style: function(f) {
        const d = (f.properties["Dem %"] || 0) * 100;
        const r = (f.properties["Rep %"] || 0) * 100;

        return {
          fillColor: getColor(d, r),
          color: 'white',
          weight: 1,
          fillOpacity: 0.75
        };
      },

      onEachFeature: function(f, layer) {

        const dem = (f.properties["Dem %"] || 0) * 100;
        const rep = (f.properties["Rep %"] || 0) * 100;

        const marginText = dem > rep
          ? `D+${(dem - rep).toFixed(1)}%`
          : `R+${(rep - dem).toFixed(1)}%`;

        const district = f.properties.DISTRICT;

        // popup
        layer.bindPopup(`
          <b>FL-${district}</b><br><br>
          Democratic: ${dem.toFixed(1)}%<br>
          Republican: ${rep.toFixed(1)}%<br>
          <b>Margin: ${marginText}</b>
        `);

        // click behavior
        layer.on('click', () => {

          if (selected) resetStyle(selected);
          selected = layer;

          layer.setStyle({
            weight: 3,
            color: '#000'
          });

          updateSidebar(f, dem, rep, marginText);
        });

        // permanent label (no FL- prefix)
        const center = layer.getBounds().getCenter();

        L.marker(center, {
          icon: L.divIcon({
            className: 'district-label',
            html: `${district}`
          }),
          interactive: false
        }).addTo(map);

      }

    }).addTo(map);

    map.fitBounds(geoLayer.getBounds());

  });

// ---------------- SEARCH ----------------
document.getElementById("search").addEventListener("input", function(e) {
  const val = e.target.value.trim();

  if (!geoLayer || val === "") return;

  geoLayer.eachLayer(layer => {
    const d = layer.feature.properties.DISTRICT;

    if (String(d) === val) {
      map.fitBounds(layer.getBounds());
      layer.fire('click');
    }
  });
});

</script>

</body>
</html>
