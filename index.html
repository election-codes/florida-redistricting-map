<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Florida Redistricting Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }

    .district-label {
      background: transparent;
      border: none;
      box-shadow: none;
      font-size: 11px;
      font-weight: 700;
      color: #111;
      text-shadow: 0 0 3px white;
      pointer-events: none;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script>

const map = L.map('map').setView([27.8, -81.7], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// ---------------- COLOR SCALE ----------------
function getColor(demPct, repPct) {
  const m = demPct - repPct;

  if (m >= 0.30) return '#08306b';
  if (m >= 0.15) return '#2171b5';
  if (m >= 0.05) return '#6baed6';
  if (m > -0.05) return '#cccccc';
  if (m > -0.15) return '#fc9272';
  if (m > -0.30) return '#ef3b2c';
  return '#99000d';
}

fetch('fl_2024_by_2026_district.geojson')
  .then(r => r.json())
  .then(data => {

    const layerGroup = L.geoJSON(data, {

      style: function(f) {
        const d = f.properties["Dem %"] || 0;
        const r = f.properties["Rep %"] || 0;

        return {
          fillColor: getColor(d, r),
          color: 'white',
          weight: 1,
          fillOpacity: 0.75
        };
      },

      onEachFeature: function(f, layer) {

        const dem = (f.properties["Dem %"] || 0) * 100;
        const rep = (f.properties["Rep %"] || 0) * 100;

        const margin = dem > rep
          ? `D+${(dem - rep).toFixed(1)}%`
          : `R+${(rep - dem).toFixed(1)}%`;

        const district = f.properties.DISTRICT;

        // ---------------- POPUP (FULL INFO) ----------------
        layer.bindPopup(
          `<b>FL-${district}</b><br><br>
          Democratic: ${dem.toFixed(1)}%<br>
          Republican: ${rep.toFixed(1)}%<br>
          <b>Margin: ${margin}</b>`
        );

        // ---------------- PERMANENT LABEL (NO HOVER NEEDED) ----------------
        const center = layer.getBounds().getCenter();

        L.marker(center, {
          icon: L.divIcon({
            className: 'district-label',
            html: `FL-${district}`
          }),
          interactive: false
        }).addTo(map);

      }

    }).addTo(map);

    map.fitBounds(layerGroup.getBounds());

  });

</script>

</body>
</html>
